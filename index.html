<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Diagram Presentations</title>
    <link rel="icon" type="image/webp" href="https://www.himanshubalani.com/favicon.webp">
<meta name="title" content="ER Diagram Presentations">
<meta name="description" content="A website built to showcase Database Entity-Relationship (ER) diagrams and their accompanying documentation.">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://himanshubalani.com/ERD">
<meta property="og:title" content="ER Diagram Presentations">
<meta property="og:description" content="A website built to showcase Database Entity-Relationship (ER) diagrams and their accompanying documentation.">
<meta property="og:site_name" content="ER Presentations">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="https://himanshubalani.com/ERD">
<meta property="twitter:title" content="ER Diagram Presentations">
<meta property="twitter:description" content="A website built to showcase Database Entity-Relationship (ER) diagrams and their accompanying documentation.">
<meta property="twitter:creator" content="@himanshubalani5">
    
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SVG Pan Zoom Library -->
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    
    <!-- Highlight.js (Dark Theme to match DelphiTools) -->
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/styles/github-dark.min.css">
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { mono:['JetBrains Mono', 'monospace'] },
                    colors: {
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        card: 'hsl(var(--card))',
                        muted: 'hsl(var(--muted))',
                        'muted-foreground': 'hsl(var(--muted-foreground))',
                        primary: '#6366f1',
                        border: 'hsl(var(--border))',
                    }
                }
            }
        }
    </script>
<body class="bg-background text-foreground font-mono antialiased overflow-hidden">

    <div class="flex flex-col h-screen">
        <!-- Top Navigation -->
        <header class="h-14 md:h-16 border-b border-border bg-card flex items-center justify-between px-4 md:px-6 shrink-0 z-40 relative">
            <div class="flex items-center">
                <!-- Mobile Menu Toggle -->
                <button id="mobile-menu-btn" class="md:hidden p-2 -ml-2 mr-2 text-muted-foreground hover:text-foreground transition-colors">
                    <i data-lucide="menu" class="size-6"></i>
                </button>
                <h1 class="text-lg md:text-xl font-bold tracking-tight truncate">ER Presentations <span class="text-primary text-xs ml-1 md:ml-2 hidden sm:inline-block">v0.2.0</span></h1>
            </div>
            <div class="text-xs md:text-sm text-muted-foreground hidden md:block truncate ml-4">
                Web Dev Cohort Assignment Submissions by <a href="https://himanshubalani.com" class="text-primary hover:underline">himanshubalani</a>
            </div>
        </header>

        <!-- Main Layout (Flex instead of Grid to allow Absolute Mobile Sidebar) -->
        <main class="flex-1 flex overflow-hidden relative w-full">
            
            <!-- Mobile Overlay Background -->
            <div id="sidebar-overlay" class="absolute inset-0 bg-background/80 backdrop-blur-sm z-20 hidden md:hidden transition-opacity"></div>

            <!-- LEFT: Sidebar Navigation (Slide-out Drawer on Mobile) -->
            <aside id="sidebar" class="absolute inset-y-0 left-0 z-30 w-72 md:w-[280px] border-r border-border bg-card md:bg-muted/10 transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0 md:flex flex-col shadow-2xl md:shadow-none h-full">
                
                <!-- Mobile Sidebar Header -->
                <div class="flex items-center justify-between p-4 border-b border-border md:hidden shrink-0">
                    <span class="font-bold text-sm text-muted-foreground">ER Assignments</span>
                    <button id="close-sidebar-btn" class="p-2 -mr-2 text-muted-foreground hover:text-foreground">
                        <i data-lucide="x" class="size-5"></i>
                    </button>
                </div>

                <div id="sidebar-list" class="flex flex-col p-4 gap-4 overflow-y-auto flex-1">
                    <!-- Javascript will inject list items here -->
                    <div class="text-center text-muted-foreground text-sm mt-10">Loading diagrams...</div>
                </div>

                <!-- Mobile Sidebar Footer Attribute -->
                <div class="p-4 border-t border-border md:hidden shrink-0 text-center text-xs text-muted-foreground mt-auto">
                    Submissions by <a href="https://himanshubalani.com" class="text-primary hover:underline">himanshubalani</a>
                </div>
            </aside>

            <!-- RIGHT: Scrollable Page Container -->
            <!-- min-w-0 prevents flex items from breaking viewport width on mobile -->
            <div class="flex-1 h-full w-full overflow-y-auto bg-card flex flex-col relative min-w-0" id="right-scroll-container">
                
                <!-- TOP: Canvas Area (Responsive Heights) -->
                <section class="relative shrink-0 h-[50vh] md:h-[75vh] min-h-[350px] md:min-h-[500px] bg-background canvas-grid group overflow-hidden border-b border-border touch-none">
                    <!-- Toolbar -->
                    <div class="absolute top-4 left-4 z-10 flex gap-2">
                        <button onclick="fitToPage()" class="flex items-center px-3 py-1.5 text-xs font-medium rounded-md bg-card/90 backdrop-blur border border-border hover:bg-muted transition-colors shadow-sm">
                            <i data-lucide="maximize" class="size-3 mr-2"></i> <span class="hidden sm:inline">Fit to Page</span><span class="sm:hidden">Fit to Page</span>
                        </button>
                    </div>

                    <!-- Canvas -->
                    <div id="canvas-area" class="w-full h-full relative cursor-grab active:cursor-grabbing">
                        <div id="svg-wrapper" class="absolute transform-origin-0-0 will-change-transform">
                            <!-- SVG injected here -->
                        </div>
                    </div>

                    <!-- Hint -->
                    <div class="absolute bottom-4 right-4 px-3 py-1.5 bg-card/90 backdrop-blur border border-border rounded-full text-[10px] text-muted-foreground pointer-events-none z-10 text-center max-w-[200px] sm:max-w-none">
                       DOUBLE TAP/ PINCH TO ZOOM • DRAG TO PAN
                    </div>
                </section>
                <!-- Diagram Switcher Dropdown -->
<div class="flex items-center md:hidden gap-3 px-5 md:px-8 py-3 border-b border-border bg-card shrink-0">
  <span class="text-[10px] uppercase tracking-widest text-muted-foreground whitespace-nowrap">diagram</span>
  <div class="relative flex-1">
    <select id="diagram-switcher"
      class="w-full appearance-none bg-muted/30 border border-border rounded-md px-3 py-1.5 pr-8 text-xs font-mono text-foreground focus:outline-none focus:ring-1 focus:ring-primary cursor-pointer">
      <!-- JS will populate options here -->
    </select>
    <!-- chevron icon -->
    <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none size-3 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <!-- prev/next arrows -->
  <div class="flex gap-1 shrink-0">
    <button id="switcher-prev" class="p-1.5 rounded-md border border-border bg-muted/30 text-muted-foreground hover:text-foreground transition-colors">
      <i data-lucide="chevron-left" class="size-3.5"></i>
    </button>
    <button id="switcher-next" class="p-1.5 rounded-md border border-border bg-muted/30 text-muted-foreground hover:text-foreground transition-colors">
      <i data-lucide="chevron-right" class="size-3.5"></i>
    </button>
  </div>
</div>
                <!-- BOTTOM: Documentation Panel -->
                <section class="shrink-0 p-5 md:p-8 flex flex-col w-full max-w-5xl mx-auto">
                    <div class="flex items-center justify-between border-b border-border pb-4 mb-4">
                        <h2 class="text-xs md:text-sm font-bold uppercase tracking-wider text-muted-foreground">Explainer</h2>
                        <i data-lucide="file-text" class="size-5 text-muted-foreground hidden sm:block"></i>
                    </div>
                    
                    <!-- Markdown Content rendered here -->
                    <div id="markdown-content" class="delphi-prose text-sm">
                        <p class="text-muted-foreground italic">Select a diagram from the sidebar to view its documentation.</p>
                    </div>
                </section>
                
            </div>
        </main>
    </div>

    <!-- Application Logic -->
    <script type="module" src="js/app.js"></script>
</body>
</html>

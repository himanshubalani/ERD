<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Presenter // DelphiTools</title>
    
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SVG Pan Zoom Library -->
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    
    <!-- Highlight.js (Dark Theme to match DelphiTools) -->
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/styles/github-dark.min.css">
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { mono:['JetBrains Mono', 'monospace'] },
                    colors: {
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        card: 'hsl(var(--card))',
                        muted: 'hsl(var(--muted))',
                        'muted-foreground': 'hsl(var(--muted-foreground))',
                        primary: '#6366f1',
                        border: 'hsl(var(--border))',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-foreground font-mono antialiased overflow-hidden">

    <div class="flex flex-col h-screen">
        <!-- Top Navigation -->
        <header class="h-16 border-b border-border bg-card flex items-center justify-between px-6 shrink-0">
            <div>
                <h1 class="text-xl font-bold tracking-tight">ER Presentations <span class="text-primary text-xs ml-2">v0.2.0</span></h1>
            </div>
            <div class="text-sm text-muted-foreground">Web Dev Cohort Assignment Submissions by <a href="https://himanshubalani.com" class="text-primary hover:underline">himanshubalani</a></div>
        </header>

        <!-- 2-Column Main Layout: Sidebar (Left) | Content (Right) -->
        <main class="flex-1 grid grid-cols-[280px_1fr] overflow-hidden">
            
            <!-- LEFT: Sidebar Navigation -->
            <aside class="border-r border-border bg-muted/10 overflow-y-auto flex flex-col p-4 gap-4" id="sidebar-list">
                <!-- Javascript will inject list items here -->
                <div class="text-center text-muted-foreground text-sm mt-10">Loading diagrams...</div>
            </aside>

            <!-- RIGHT: Scrollable Page Container -->
            <!-- Added overflow-y-auto here so the whole right side scrolls -->
            <div class="h-full overflow-y-auto bg-card flex flex-col relative" id="right-scroll-container">
                
                <!-- TOP: Canvas Area -->
                <!-- Removed flex-1, gave it a height of 75vh and border-b -->
                <section class="relative shrink-0 h-[75vh] min-h-[500px] bg-background canvas-grid group overflow-hidden border-b border-border">
                    <!-- Toolbar -->
                    <div class="absolute top-4 left-4 z-10 flex gap-2">
                        <button onclick="fitToPage()" class="flex items-center px-3 py-1.5 text-xs font-medium rounded-md bg-card/90 backdrop-blur border border-border hover:bg-muted transition-colors shadow-sm">
                            <i data-lucide="maximize" class="size-3 mr-2"></i> Fit to Page
                        </button>
                    </div>

                    <!-- Canvas -->
                    <div id="canvas-area" class="w-full h-full relative cursor-grab active:cursor-grabbing">
                        <div id="svg-wrapper" class="absolute transform-origin-0-0 will-change-transform">
                            <!-- SVG injected here -->
                        </div>
                    </div>

                    <!-- Hint -->
                    <div class="absolute bottom-4 right-4 px-3 py-1.5 bg-card/90 backdrop-blur border border-border rounded-full text-[10px] text-muted-foreground pointer-events-none z-10">
                       DOUBLE TAP OR SCROLL TO ZOOM • DRAG TO PAN
                    </div>
                </section>

                <!-- BOTTOM: Documentation Panel -->
                <!-- Removed h-[40%] and local overflow. Added mx-auto to center the text nicely -->
                <section class="shrink-0 p-8 md:p-4 flex flex-col w-full max-w-5xl mx-auto">
                    <div class="flex items-center justify-between border-b border-border pb-4 mb-2">
                        <h2 class="text-sm font-bold uppercase tracking-wider text-muted-foreground">Submission Material and Thoughts</h2>
                        <i data-lucide="file-text" class="size-5 text-muted-foreground"></i>
                    </div>
                    
                    <!-- Markdown Content rendered here -->
                    <div id="markdown-content" class="delphi-prose text-sm">
                        <p class="text-muted-foreground italic">Select a diagram from the sidebar to view its documentation.</p>
                    </div>
                </section>
                
            </div>
        </main>
    </div>

    <!-- Application Logic (Must be type="module" to support ESM imports) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
